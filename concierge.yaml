juju:
  model-defaults:
    logging-config: <root>=INFO; unit=DEBUG
providers:
  lxd:
    enable: true
    bootstrap: true
    channel: latest/stable
  k8s:
    enable: true
    bootstrap: false
    bootstrap-constraints:
      root-disk: 5G
host:
  snaps:
    jhack:
      channel: latest/edge
      connections:
        - jhack:dot-local-share-juju snapd
